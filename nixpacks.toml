# Nixpacks configuration for Railway - Monorepo
[phases.setup]
nixPkgs = ["nodejs-18_x"]

[phases.install]
cmds = ["npm install && cd backend && npm install && cd ../frontend && npm install"]

[phases.build]
cmds = ["cd frontend && npm run build", "cd ../backend && npm run build"]

[start]
cmd = "node backend/dist/server.js"
